<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamat Idul Fitri</title>
<style>
body{
  margin:0;
  height:100vh;
  font-family:Segoe UI, sans-serif;
  background:linear-gradient(#000428,#004e92);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-align:center;
  position:relative;
}

/* bintang */
.star{
  position:absolute;
  width:3px;height:3px;
  background:white;
  border-radius:50%;
  box-shadow:0 0 6px white,0 0 12px white;
  animation:twinkle 1.5s infinite alternate;
}
@keyframes twinkle{
  0% {opacity:0.2; transform:scale(0.7);}
  50% {opacity:1; transform:scale(1.2);}
  100% {opacity:0.3; transform:scale(1);}
}

/* awan */
.cloud{
  position:absolute;top:0;width:300px;height:100px;
  background:rgba(255,255,255,0.15);border-radius:50%;filter:blur(25px);
  animation:moveClouds linear infinite;
}
.cloud:nth-child(1){top:15%; left:-350px; animation-duration:100s;}
.cloud:nth-child(2){top:35%; left:-400px; animation-duration:150s;}
.cloud:nth-child(3){top:55%; left:-300px; animation-duration:120s;}
@keyframes moveClouds{0%{transform:translateX(0);}100%{transform:translateX(150vw);}}

/* bulan */
.moon{
  position:absolute;top:60px;right:120px;width:120px;height:120px;
  background:white;border-radius:50%;box-shadow:0 0 40px white;z-index:1;
}

/* masjid */
.mosque{
  position:absolute;bottom:0;width:100%;height:240px;
  background:black;
  clip-path:polygon(0% 100%,0% 70%,10% 70%,15% 50%,20% 70%,30% 70%,35% 45%,40% 70%,50% 70%,55% 50%,60% 70%,70% 70%,75% 45%,80% 70%,90% 70%,100% 70%,100% 100%);
  z-index:3;
}

/* ketupat */
.ketupat{
  position:absolute;width:35px;height:35px;
  background:linear-gradient(45deg,#9be15d,#00e3ae);
  transform:rotate(45deg);
  animation:float 6s infinite ease-in-out;
  z-index:2;
}
@keyframes float{
  0%{transform:translateY(0) rotate(45deg);}
  50%{transform:translateY(-20px) rotate(45deg);}
  100%{transform:translateY(0) rotate(45deg);}
}

/* card */
.card{
  background:rgba(255,255,255,0.12);padding:45px;border-radius:25px;
  backdrop-filter:blur(12px);box-shadow:0 0 40px rgba(0,0,0,0.4);
  transform:scale(1);transition:all 1s ease;position:relative;z-index:5;
}
.card.show{transform:scale(1.05);}

button{
  padding:14px 35px;font-size:18px;border:none;border-radius:30px;
  background:linear-gradient(45deg,#FFD700,#fff3a0);
  cursor:pointer;
  animation:pulse 2s infinite;
  position:relative;overflow:hidden;
}
@keyframes pulse{
  0%{box-shadow:0 0 10px gold;}
  50%{box-shadow:0 0 25px gold;}
  100%{box-shadow:0 0 10px gold;}
}
button::before{
  content:"";
  position:absolute;top:0;left:-75%;
  width:50%;height:100%;
  background:rgba(255,255,255,0.5);
  transform:skewX(-25deg);
  animation:shine 3s infinite;
}
@keyframes shine{
  0%{left:-75%;}
  100%{left:125%;}
}

/* konten */
#konten{display:none;}
.fade-up{opacity:0; transform:translateY(30px);}
.fade-up.show{animation:fadeUp 1s forwards;}
@keyframes fadeUp{to{opacity:1; transform:translateY(0);}}
.delay1{animation-delay:0.2s;}
.delay2{animation-delay:0.6s;}
.delay3{animation-delay:1s;}

.glow-text{
  background:linear-gradient(90deg,#fff,#FFD700,#fff);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shineText 3s linear infinite;
  text-shadow:0 0 5px rgba(255,255,255,0.8),
              0 0 10px rgba(255,215,0,0.8),
              0 0 20px rgba(255,215,0,0.6);
}
@keyframes shineText{0%{background-position:0%}100%{background-position:200%;}}

/* kembang api */
.firework{position:absolute;width:6px;height:6px;border-radius:50%;animation:explode 1.5s ease-out forwards;}
@keyframes explode{0%{transform:scale(0);opacity:1;}100%{transform:scale(20);opacity:0;}}

/* hint klik */
#hint{
  position:fixed;bottom:15px;right:15px;font-size:14px;
  padding:8px 12px;background:rgba(255,255,255,0.1);
  border-radius:12px;color:#fff;font-weight:bold;text-shadow:0 0 5px rgba(255,255,255,0.7);
  z-index:999;pointer-events:none;
}

/* efek melayang isi ucapan lebih terlihat */
.float-text{
  display:inline-block;
  position:relative;
  animation:floatText 12s ease-in-out infinite alternate;
}
@keyframes floatText{
  0%{transform:translate(0px,0px);}
  20%{transform:translate(8px,-6px);}
  40%{transform:translate(-6px,8px);}
  60%{transform:translate(5px,-4px);}
  80%{transform:translate(-7px,6px);}
  100%{transform:translate(4px,-5px);}
}
</style>
</head>
<body>

<!-- audio -->
<audio id="bgSound" src="bg.wav" preload="auto" loop></audio>
<audio id="boomSound" src="boom.wav" preload="auto"></audio>
<audio id="tapSound" src="tap.wav" preload="auto"></audio>

<!-- awan -->
<div class="cloud"></div>
<div class="cloud"></div>
<div class="cloud"></div>

<div class="moon"></div>
<div class="mosque"></div>

<div class="ketupat" style="left:10%;top:30%"></div>
<div class="ketupat" style="left:85%;top:60%"></div>
<div class="ketupat" style="left:25%;top:75%"></div>

<!-- card -->
<div class="card" id="card">
  <button id="btn" onclick="bukaUcapan()">Buka Ucapan</button>
  <div id="konten">
    <h1 class="fade-up delay1 glow-text float-text">🌙 Selamat Hari Raya</h1>
    <h2 class="fade-up delay2 glow-text float-text">Idul Fitri 1447 H</h2>
    <div class="fade-up delay3 glow-text float-text">
      ✨ Taqabbalallahu minna wa minkum ✨<br><br>
      Semoga di hari yang suci ini kita kembali fitri,<br>
      dipenuhi kebahagiaan, keberkahan,<br>
      dan silaturahmi yang indah.
    </div>
  </div>
</div>

<div id="hint">Klik dimana saja!</div>

<script>
// bintang
for(let i=0;i<100;i++){
  let star=document.createElement("div");
  star.className="star";
  star.style.left=Math.random()*100+"%";
  star.style.top=Math.random()*100+"%";
  star.style.animationDuration=(Math.random()*2+1)+"s"; // beda-beda
  document.body.appendChild(star);
}

// Web Audio API preload tap + boom
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let audioBuffers = {};
async function loadAudio(name,url){
  const res = await fetch(url);
  const arrayBuffer = await res.arrayBuffer();
  audioBuffers[name]=await audioCtx.decodeAudioData(arrayBuffer);
}
function playAudio(name,loop=false){
  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffers[name];
  source.loop = loop;
  source.connect(audioCtx.destination);
  source.start(0);
  return source;
}
Promise.all([
  loadAudio('boom','boom.wav'),
  loadAudio('tap','tap.wav')
]).then(()=>console.log('Audio loaded'));

// kembang api
function ledakanMeriah(){
  for(let i=0;i<30;i++){
    let fire=document.createElement("div");
    fire.className="firework";
    fire.style.left=Math.random()*100+"%";
    fire.style.top=Math.random()*80+"%";
    fire.style.background=`hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(fire);
  }
}

let bgPlayed=false;
function bukaUcapan(){
  document.getElementById("btn").style.display="none";
  document.getElementById("konten").style.display="block";
  document.getElementById("card").classList.add("show");
  document.querySelectorAll(".fade-up").forEach(el=>el.classList.add("show"));
  document.getElementById("hint").style.display="none";

  // play bg audio via tag
  if(!bgPlayed){
    const bg = document.getElementById("bgSound");
    bg.currentTime=0;
    bg.play().catch(()=>{console.log('BG play blocked')});
    bgPlayed=true;
  }

  // kembang api
  playAudio('boom');
  ledakanMeriah();
}

// klik layar efek + suara tap
document.addEventListener("click", function(e){
  if(e.target.id==="btn") return;
  document.getElementById("hint").style.display="none";
  playAudio('tap');
  for(let i=0;i<10;i++){
    let fire=document.createElement("div");
    fire.className="firework";
    fire.style.left=e.clientX+"px";
    fire.style.top=e.clientY+"px";
    fire.style.background=`hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(fire);
  }
});
</script>
</body>
</html>
